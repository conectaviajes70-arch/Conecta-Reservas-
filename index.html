<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #fff;
}

.container {
  padding: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1a1f2e;
  color: #fff;
}

#map {
  width: 100%;
  height: 200px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.result {
  background: #121726;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.switch {
  display: flex;
  align-items: center;
  margin-top: 10px;
}

.switch input {
  margin-right: 10px;
}

.price {
  font-size: 20px;
  color: #00e5ff;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<input id="origen" placeholder="📍 Origen">
<input id="destino" placeholder="📍 Destino">

<div id="map"></div>

<div class="switch">
  <input type="checkbox" id="round">
  <label>Viaje redondo</label>
</div>

<div class="result">
  <div>📏 Distancia: <span id="km">0</span> km</div>
  <div class="price">💰 $<span id="price">0</span></div>
</div>

</div>

<script>
mapboxgl.accessToken = 'TU_TOKEN_MAPBOX';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-99.1332, 19.4326],
  zoom: 10
});

let origenCoord, destinoCoord;

async function geocode(place) {
  const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${place}.json?access_token=${mapboxgl.accessToken}`);
  const data = await res.json();
  return data.features[0].center;
}

async function calcularRuta() {
  if (!origenCoord || !destinoCoord) return;

  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${origenCoord[0]},${origenCoord[1]};${destinoCoord[0]},${destinoCoord[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;
  
  const res = await fetch(url);
  const data = await res.json();

  const route = data.routes[0];
  const km = (route.distance / 1000).toFixed(2);

  document.getElementById('km').innerText = km;

  calcularPrecio(km);

  if (map.getSource('route')) {
    map.getSource('route').setData(route.geometry);
  } else {
    map.addSource('route', {
      type: 'geojson',
      data: route.geometry
    });

    map.addLayer({
      id: 'route',
      type: 'line',
      source: 'route',
      paint: {
        'line-color': '#00e5ff',
        'line-width': 4
      }
    });
  }
}

function calcularPrecio(km) {
  let price = 0;

  if (km <= 10) price = 100;
  else if (km <= 20) price = 200;
  else if (km <= 40) price = 500;
  else price = km * 15;

  if (document.getElementById('round').checked) {
    price *= 1.6; // descuento ida y vuelta
  }

  document.getElementById('price').innerText = Math.round(price);
}

document.getElementById('origen').addEventListener('change', async (e) => {
  origenCoord = await geocode(e.target.value);
  calcularRuta();
});

document.getElementById('destino').addEventListener('change', async (e) => {
  destinoCoord = await geocode(e.target.value);
  calcularRuta();
});

document.getElementById('round').addEventListener('change', () => {
  const km = document.getElementById('km').innerText;
  calcularPrecio(km);
});
</script>

</body>
</html>
